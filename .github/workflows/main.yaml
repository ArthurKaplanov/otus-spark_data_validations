on:
  push:
    branches: ['main']

env:
  PATH_FOR_LINT: src tests config

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv sync --dev -p 3.13

      - name: Run isort
        run: |
          uv run isort ${{ env.PATH_FOR_LINT }} --profile black --check-only

      - name: Run black
        run: |
          uv run black ${{ env.PATH_FOR_LINT }} --check

      - name: Run ruff
        run: |
          uv run ruff check ${{ env.PATH_FOR_LINT }}
