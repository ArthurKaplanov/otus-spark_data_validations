fail_fast: true

repos:
  - repo: local
    hooks:
      - &default_hook
        id: default
        name: default
        entry: uv run python -c "print('No entry for default hook')"
        files: &files ^(src|tests)/
        args: &paths_list
          - src
          - tests
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - <<: *default_hook
        id: isort
        name: isort
        entry: uv run isort
        args: *paths_list

      - <<: *default_hook
        id: black
        name: black
        entry: uv run black
        args: *paths_list

      - <<: *default_hook
        id: ruff-check
        name: ruff check
        entry: uv run ruff check
        args: *paths_list

      - <<: *default_hook
        id: ruff-format
        name: ruff format
        entry: uv run ruff format
        args: *paths_list

